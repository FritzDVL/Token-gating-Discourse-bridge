# Optional nginx snippet.
#
# The bridge does NOT need any public HTTP endpoint to function — it
# reads the chain directly over outbound WebSocket and applies changes
# via the Discourse REST API. The /admin/* routes are kept on
# 127.0.0.1:3001 and reached via SSH tunnel:
#
#   ssh -L 3001:127.0.0.1:3001 user@vps
#   curl -H "Authorization: Bearer $ADMIN_TOKEN" \
#        "http://127.0.0.1:3001/admin/status"
#
# Only deploy this file if you specifically want a public /healthz for
# an external uptime monitor (UptimeRobot, etc).

server {
    listen 443 ssl http2;
    server_name forum.societyprotocol.io;

    ssl_certificate     /etc/letsencrypt/live/forum.societyprotocol.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forum.societyprotocol.io/privkey.pem;

    # Public health check for uptime monitoring. No auth.
    location = /tg-bridge/healthz {
        proxy_pass http://127.0.0.1:3001/healthz;
    }

    # Do NOT expose /admin/* publicly.
}
